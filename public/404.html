<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>GameVault</title>
    <script>
      // GitHub Pages SPA redirect trick
      var l = window.location;
      l.replace(l.protocol+'//'+l.hostname+(l.port?':'+l.port:'')+l.pathname.split('/').slice(0,2).join('/')+'/?p='+encodeURIComponent(l.pathname.slice(1)+l.search)+'&q='+encodeURIComponent(l.search.slice(1))+'#'+l.hash.slice(1));
    </script>
  </head>
</html>
